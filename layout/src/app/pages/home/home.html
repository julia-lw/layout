<main class="flex flex-col min-h-screen bg-gray-950">
    <header class="mb-10 text-center container mx-auto px-6 py-6 md:text-left">
        <h2 class="text-4xl font-extrabold text-white">Tecnologias Frontend</h2>
        <p class="mt-3 text-lg text-purple-200">Conheça abaixo algumas tecnologias Frontend:</p>
    </header>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 p-6 py-0">
    <article *ngFor="let item of requisicao" 
             class="group relative p-0.5 rounded-lg bg-linear-to-br from-fuchsia-300 to-purple-600">
        <div class="bg-slate-900 p-6 rounded-[7px] h-full transition-colors group-hover:bg-slate-800/50">
            <h3 class="text-purple-100 font-mono font-semibold uppercase tracking-widest text-sm mb-3">
                {{item.tecnologia}}
            </h3>
            <p class="text-slate-300 text-sm italic">
                "{{item.descricao}}"
            </p>
        </div>
    </article>
</div>
</main>
